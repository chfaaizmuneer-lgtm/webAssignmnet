<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contact Form</title>
    <style>
        /* ── Reset & Base ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Card Container ── */
        .form-container {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 12px;
            border: 1px solid #d1dce8;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        /* ── Heading ── */
        .form-container h2 {
            margin-bottom: 8px;
            color: #1a202c;
            font-size: 1.8rem;
        }

        .form-container p {
            color: #718096;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        /* ── Form Groups ── */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2d3748;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
            color: #2d3748;
            background: #f7fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
            background: #fff;
        }

        /* ── Submit Button ── */
        .btn-submit {
            width: 100%;
            padding: 13px;
            background: #4299e1;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            background: #3182ce;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* ── Footer Note ── */
        .form-footer {
            margin-top: 20px;
            font-size: 0.82rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>📬 Contact Us</h2>
        <p>Fill in your details and we'll get back to you.</p>

        <form action="/submit" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="e.g. Faaiz Muneer"
                    required
                />
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="e.g. abc@example.com"
                    required
                />
            </div>

            <button type="submit" class="btn-submit">Submit Form</button>
        </form>

        <p class="form-footer">Your information is safe with us.</p>
    </div>
</body>
</html>
